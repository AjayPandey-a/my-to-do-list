<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern ToDo App</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center">

<div class="bg-white w-96 p-6 rounded-2xl shadow-2xl">

<h1 class="text-2xl font-bold text-center text-gray-700 mb-4">
✨ My ToDo List
</h1>

<div class="flex gap-2">
<input id="taskInput"
class="flex-1 border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400"
type="text"
placeholder="Add a task...">

<button onclick="addTask()"
class="bg-purple-500 text-white px-4 py-2 rounded-lg hover:bg-purple-600 transition">
Add
</button>
</div>

<ul id="taskList" class="mt-5 space-y-3"></ul>

</div>

<script>

function addTask() {

let input = document.getElementById("taskInput");
let text = input.value.trim();

if(text === "") return;

let li = document.createElement("li");

li.className = "flex justify-between items-center bg-gray-100 p-3 rounded-lg hover:bg-gray-200 transition";

li.innerHTML = `
<span onclick="toggleComplete(this)" class="cursor-pointer">${text}</span>

<button onclick="deleteTask(this)" 
class="text-red-500 hover:text-red-700 font-bold">
✖
</button>
`;

document.getElementById("taskList").appendChild(li);

input.value = "";

}

function toggleComplete(el){
el.classList.toggle("line-through");
el.classList.toggle("text-gray-400");
}

function deleteTask(el){
el.parentElement.remove();
}

</script>

</body>
</html>
